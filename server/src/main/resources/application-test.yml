spring:
  datasource:
    url: jdbc:h2:mem:roomrentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  seed-demo-data: true
  admin:
    email: admin@roomrentmaharashtra.com
    password: Admin@12345
    name: RoomRent Maharashtra Admin
