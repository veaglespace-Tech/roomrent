spring:
  config:
    import: optional:file:.env
  jackson:
    serialization:
      fail-on-empty-beans: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${SPRING_MAIL_HOST:smtp.gmail.com}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  jwt:
    secret: ${APP_JWT_SECRET:roomrent-dev-jwt-secret-change-me-1234567890}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000}
  mail:
    from: ${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
